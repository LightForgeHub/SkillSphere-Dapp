name: Soroban Build & Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  soroban:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli --version 21.0.0

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build contract
        run: soroban contract build

  sdk:
    runs-on: ubuntu-latest
    needs: soroban
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli --version 21.0.0

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Generate TypeScript SDK
        run: |
          soroban contract bindings typescript \
            --wasm target/wasm32-unknown-unknown/release/skillsphere_contract.wasm \
            --output-dir ../sdk/typescript \
            --contract-name skillsphere

      - name: Commit generated SDK
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/typescript
          git diff --cached --quiet || git commit -m "chore: regenerate TypeScript SDK"
          git push
